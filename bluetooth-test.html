<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluetooth Device Test - AgroNova</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .status {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .status.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #log {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
            margin-top: 20px;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-left: 3px solid #667eea;
            padding-left: 10px;
        }
        
        .log-entry.error {
            border-left-color: #dc3545;
            color: #dc3545;
        }
        
        .log-entry.success {
            border-left-color: #28a745;
            color: #28a745;
        }
        
        .log-entry.info {
            border-left-color: #17a2b8;
            color: #17a2b8;
        }
        
        #deviceInfo {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            display: none;
        }
        
        #deviceInfo.show {
            display: block;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px;
            background: white;
            border-radius: 5px;
        }
        
        .info-label {
            font-weight: 600;
            color: #666;
        }
        
        .info-value {
            color: #333;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔵 Bluetooth Device Finder</h1>
        <p class="subtitle">AgroNova Smart Irrigation - HC-05 Connection Test</p>
        
        <div id="browserStatus" class="status info">
            Checking browser compatibility...
        </div>
        
        <button id="scanBtn" onclick="scanForDevices()" disabled>
            🔍 Scan for Bluetooth Devices
        </button>
        
        <button id="connectBtn" onclick="connectToDevice()" disabled style="display: none;">
            🔗 Connect to Selected Device
        </button>
        
        <button id="disconnectBtn" onclick="disconnectDevice()" disabled style="display: none;">
            ❌ Disconnect Device
        </button>
        
        <div id="deviceInfo">
            <h3 style="margin-bottom: 10px;">Connected Device Info</h3>
            <div id="deviceDetails"></div>
        </div>
        
        <div id="log"></div>
    </div>

    <script>
        let selectedDevice = null;
        let gattServer = null;
        let characteristic = null;
        
        // Check browser support on load
        window.onload = function() {
            checkBrowserSupport();
        };
        
        function checkBrowserSupport() {
            const statusDiv = document.getElementById('browserStatus');
            const scanBtn = document.getElementById('scanBtn');
            
            if (!navigator.bluetooth) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ <strong>Web Bluetooth not supported</strong><br>' +
                    'Please use Chrome, Edge, or Opera browser.<br>' +
                    'Firefox and Safari do not support Web Bluetooth API.';
                log('Web Bluetooth API not available', 'error');
            } else {
                statusDiv.className = 'status success';
                statusDiv.innerHTML = '✅ <strong>Web Bluetooth is supported!</strong><br>' +
                    'Your browser can connect to Bluetooth devices.';
                scanBtn.disabled = false;
                log('Web Bluetooth API available', 'success');
            }
        }
        
        async function scanForDevices() {
            const scanBtn = document.getElementById('scanBtn');
            const connectBtn = document.getElementById('connectBtn');
            
            scanBtn.disabled = true;
            log('Starting Bluetooth device scan...', 'info');
            
            try {
                // Request device - accept all devices
                selectedDevice = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [
                        '0000ffe0-0000-1000-8000-00805f9b34fb',
                        '0000ffe1-0000-1000-8000-00805f9b34fb',
                        '00001101-0000-1000-8000-00805f9b34fb'
                    ]
                });
                
                if (selectedDevice) {
                    log(`✓ Device selected: ${selectedDevice.name || 'Unknown Device'}`, 'success');
                    log(`Device ID: ${selectedDevice.id}`, 'info');
                    connectBtn.style.display = 'block';
                    connectBtn.disabled = false;
                    scanBtn.textContent = '🔄 Scan Again';
                }
                
            } catch (error) {
                if (error.message.includes('User cancelled')) {
                    log('Device selection cancelled by user', 'info');
                } else {
                    log(`Error: ${error.message}`, 'error');
                }
            } finally {
                scanBtn.disabled = false;
            }
        }
        
        async function connectToDevice() {
            if (!selectedDevice) {
                log('No device selected', 'error');
                return;
            }
            
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const deviceInfo = document.getElementById('deviceInfo');
            const deviceDetails = document.getElementById('deviceDetails');
            
            connectBtn.disabled = true;
            log(`Connecting to ${selectedDevice.name}...`, 'info');
            
            try {
                // Connect to GATT server
                gattServer = await selectedDevice.gatt.connect();
                log('✓ GATT server connected', 'success');
                
                // Get all services
                const services = await gattServer.getPrimaryServices();
                log(`Found ${services.length} service(s)`, 'info');
                
                let detailsHTML = '';
                detailsHTML += `<div class="info-row">
                    <span class="info-label">Device Name:</span>
                    <span class="info-value">${selectedDevice.name || 'Unknown'}</span>
                </div>`;
                detailsHTML += `<div class="info-row">
                    <span class="info-label">Device ID:</span>
                    <span class="info-value">${selectedDevice.id}</span>
                </div>`;
                detailsHTML += `<div class="info-row">
                    <span class="info-label">Connected:</span>
                    <span class="info-value">✅ Yes</span>
                </div>`;
                detailsHTML += `<div class="info-row">
                    <span class="info-label">Services:</span>
                    <span class="info-value">${services.length}</span>
                </div>`;
                
                // Try to find and list characteristics
                for (let i = 0; i < services.length; i++) {
                    const service = services[i];
                    log(`Service ${i + 1}: ${service.uuid}`, 'info');
                    
                    try {
                        const characteristics = await service.getCharacteristics();
                        log(`  Found ${characteristics.length} characteristic(s)`, 'info');
                        
                        characteristics.forEach((char, idx) => {
                            const props = [];
                            if (char.properties.read) props.push('read');
                            if (char.properties.write) props.push('write');
                            if (char.properties.notify) props.push('notify');
                            
                            log(`  Characteristic ${idx + 1}: ${char.uuid} [${props.join(', ')}]`, 'info');
                            
                            // Try to use the first characteristic with notify
                            if (char.properties.notify && !characteristic) {
                                characteristic = char;
                                log(`  ✓ Using this characteristic for data`, 'success');
                            }
                        });
                    } catch (e) {
                        log(`  Error reading characteristics: ${e.message}`, 'error');
                    }
                }
                
                // Try to start notifications if we found a characteristic
                if (characteristic) {
                    try {
                        await characteristic.startNotifications();
                        characteristic.addEventListener('characteristicvaluechanged', handleNotification);
                        log('✓ Notifications started - listening for data', 'success');
                        detailsHTML += `<div class="info-row">
                            <span class="info-label">Data Stream:</span>
                            <span class="info-value">✅ Active</span>
                        </div>`;
                    } catch (e) {
                        log(`Could not start notifications: ${e.message}`, 'error');
                    }
                }
                
                deviceDetails.innerHTML = detailsHTML;
                deviceInfo.classList.add('show');
                
                connectBtn.style.display = 'none';
                disconnectBtn.style.display = 'block';
                disconnectBtn.disabled = false;
                
                log('✓ Connection successful!', 'success');
                
            } catch (error) {
                log(`Connection error: ${error.message}`, 'error');
                connectBtn.disabled = false;
            }
        }
        
        function handleNotification(event) {
            const value = event.target.value;
            const decoder = new TextDecoder('utf-8');
            const data = decoder.decode(value);
            log(`📊 Data received: ${data}`, 'success');
        }
        
        async function disconnectDevice() {
            const disconnectBtn = document.getElementById('disconnectBtn');
            const deviceInfo = document.getElementById('deviceInfo');
            const scanBtn = document.getElementById('scanBtn');
            
            disconnectBtn.disabled = true;
            
            try {
                if (characteristic) {
                    await characteristic.stopNotifications();
                }
                
                if (gattServer && gattServer.connected) {
                    await gattServer.disconnect();
                }
                
                log('✓ Disconnected successfully', 'success');
                
                selectedDevice = null;
                gattServer = null;
                characteristic = null;
                
                deviceInfo.classList.remove('show');
                disconnectBtn.style.display = 'none';
                scanBtn.textContent = '🔍 Scan for Bluetooth Devices';
                
            } catch (error) {
                log(`Disconnect error: ${error.message}`, 'error');
            }
        }
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
    </script>
</body>
</html>
