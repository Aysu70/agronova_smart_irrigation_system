<!DOCTYPE html>
<html>
<head>
    <title>Test Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #45a049;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 3px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🧪 Test Registration API</h1>
    
    <div id="serverStatus" class="info" style="display: block; margin-bottom: 20px;">
        Checking server status...
    </div>

    <form id="registerForm">
        <div class="form-group">
            <label>Name:</label>
            <input type="text" id="name" value="Test User" required>
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" value="test@example.com" required>
        </div>

        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="password" value="password123" required>
        </div>

        <div class="form-group">
            <label>Region (optional):</label>
            <input type="text" id="region" value="Baku" placeholder="e.g., Baku">
        </div>

        <button type="submit">Register</button>
        <button type="button" onclick="testAdmin()">Test Admin Login</button>
        <button type="button" onclick="clearResult()">Clear</button>
    </form>

    <div id="result"></div>

    <script>
        const API_URL = 'http://localhost:5001/api';

        // Check server status on load
        window.onload = async () => {
            try {
                const response = await fetch(`${API_URL}/sensors/latest`);
                const data = await response.json();
                document.getElementById('serverStatus').innerHTML = '✅ Backend server is running on port 5001';
                document.getElementById('serverStatus').className = 'success';
            } catch (error) {
                document.getElementById('serverStatus').innerHTML = '❌ Backend server is NOT running. Start it with: cd backend && node src/server.js';
                document.getElementById('serverStatus').className = 'error';
            }
        };

        async function testAdmin() {
            showResult('Testing admin login...', 'info');
            
            const loginData = {
                email: 'admin@agranova.com',
                password: 'admin123'
            };

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(loginData)
                });

                const data = await response.json();
                
                if (response.ok) {
                    showResult('Admin Login Successful!', 'success', data);
                    localStorage.setItem('token', data.data.token);
                } else {
                    showResult('Admin Login Failed', 'error', data);
                }
            } catch (error) {
                showResult('Network Error', 'error', { message: error.message });
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const region = document.getElementById('region').value;

            showResult('Sending registration request...', 'info');

            const registerData = {
                name,
                email,
                password,
                region
            };

            try {
                console.log('Sending:', registerData);
                
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(registerData)
                });

                const data = await response.json();
                console.log('Response:', data);
                
                if (response.ok) {
                    showResult('Registration Successful!', 'success', data);
                    if (data.data && data.data.token) {
                        localStorage.setItem('token', data.data.token);
                    }
                } else {
                    showResult('Registration Failed', 'error', data);
                }
            } catch (error) {
                showResult('Network Error', 'error', { 
                    message: error.message,
                    details: 'Make sure the backend server is running on port 5001'
                });
            }
        });

        function showResult(title, type, data = null) {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = type;
            
            let html = `<h3>${title}</h3>`;
            if (data) {
                html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
            
            resultDiv.innerHTML = html;
        }

        function clearResult() {
            document.getElementById('result').style.display = 'none';
        }
    </script>
</body>
</html>
